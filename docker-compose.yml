# Docker Compose for Cattle Breed Classifier
# Run: docker-compose up --build
version: "3.9"
services:
  db:
    image: postgres:15
    container_name: cattle-db
    environment:
      - POSTGRES_DB=cattledb
      - POSTGRES_USER=cattleuser
      - POSTGRES_PASSWORD=cattlepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cattle-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/resnet_best.pth
      - METADATA_PATH=/app/data/breed_metadata.csv
      - CLASSES_PATH=/app/models/classes.txt
      - MODEL_NAME=resnet
      - MODEL_VERSION=v2.0
      - DATABASE_URL=postgresql://cattleuser:cattlepass@db:5432/cattledb
    depends_on:
      - db
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cattle-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
